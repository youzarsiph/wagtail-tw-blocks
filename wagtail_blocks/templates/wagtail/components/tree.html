{% load wagtailcore_tags %}

<!---->
{% for p in page.get_children.live.public %}
<!---->
{% if p.get_children.live.public.count > 0 %}
<li>
  <details>
    <summary>{{ p.title }}</summary>
    <ul>
      {% include 'wagtail/components/tree.html' with page=p %}
    </ul>
  </details>
</li>
{% else %}
<li>
  <a href="{% pageurl p %}">{{ p.title }}</a>
</li>
{% endif %}{% endfor %}
